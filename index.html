<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فرم عریض دریافت بریف طراحی بنر و KV</title>
    <style>
        :root {
            --bg-color: #0A0B0D;
            --card-bg: #121418;
            --accent-color: #B5FF00; /* سبز نئون */
            --text-color: #E2E8F0;
            --muted-text: #94A3B8;
            --border-color: #262930;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* ساختار عریض و بزرگ فرم */
        .form-container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 1400px; /* عریض برای مانیتورهای بزرگ */
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .form-header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 25px;
            margin-bottom: 35px;
        }

        .form-header h1 {
            font-size: 28px;
            color: #FFF;
            margin-bottom: 10px;
        }

        .form-header p {
            color: var(--muted-text);
            font-size: 15px;
        }

        /* چیدمان ۳ ستونه ماتریکسی */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* فیلدهای تمام عرض */
        .form-group.full-width {
            grid-column: span 3;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        label span {
            color: var(--muted-text);
            font-size: 12px;
            font-weight: normal;
        }

        input, textarea, select {
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 14px;
            color: #FFF;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 12px rgba(181, 255, 0, 0.2);
            background-color: rgba(255, 255, 255, 0.04);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        button {
            background-color: var(--accent-color);
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.3s ease;
            margin-top: 24px;
            width: 100%;
        }

        button:hover {
            background-color: #a2e600;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        /* واکنش‌گرایی برای تبلت و موبایل */
        @media (max-width: 1024px) {
            .form-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .form-group.full-width {
                grid-column: span 2;
            }
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-container {
                padding: 20px;
            }
            .form-group.full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

<form action="https://api.web3forms.com/submit" method="POST">
  <input type="hidden" name="access_key" value="17c360d8-5830-4edc-8b4c-f3ab261f202b">
  <input type="text" name="name" required>
  <input type="email" name="email" required>
  <textarea name="message" required></textarea>
  <button type="submit">Submit</button>
</form>
        <form id="briefForm">
            <div class="form-grid">
                
                <div class="form-group full-width">
                    <label for="business_goal">هدف تجاری <span>(محصول چیست؟ چه مشکلی حل می‌کند؟ برای چه کسی است؟ مزیت اصلی و رقابتی چیست؟)</span></label>
                    <textarea id="business_goal" required placeholder="مثال: محصول هارد اکسترنال مقاوم... بازار هدف کاربران عمومی و حرفه‌ای..."></textarea>
                </div>

                <div class="form-group">
                    <label for="main_headline">شعار یا تیتر اصلی <span>(فارسی/انگلیسی)</span></label>
                    <input type="text" id="main_headline" required placeholder="مثال: یادت همیشه همراهته">
                </div>

                <div class="form-group">
                    <label for="sub_headline">شعار یا تیتر فرعی <span>(فارسی/انگلیسی)</span></label>
                    <input type="text" id="sub_headline" placeholder="مثال: انواع هارد اکسترنال و فلش مموری؛ هم اکنون!">
                </div>

                <div class="form-group">
                    <label for="features">ویژگی‌های اصلی محصول <span>(ساعت شارژ، تعداد پورت و...)</span></label>
                    <input type="text" id="features" placeholder="مثال: ضد ضربه، سرعت بالا">
                </div>

                <div class="form-group">
                    <label for="cta">کال تو اکشن (CTA)</label>
                    <input type="text" id="cta" placeholder="مثال: کلیک کنید / الان بخرید">
                </div>

                <div class="form-group">
                    <label for="banner_sizes">تعداد و ابعاد سایزهای درخواستی <span>(پیکسل)</span></label>
                    <input type="text" id="banner_sizes" required placeholder="مثال: 1080*1920 و 245*600">
                </div>

                <div class="form-group">
                    <label for="size_limit">محدودیت حجم خروجی</label>
                    <input type="text" id="size_limit" placeholder="مثال: 280kb">
                </div>

                <div class="form-group">
                    <label for="placement_links">لینک‌های محل قرارگیری بنر</label>
                    <input type="url" id="placement_links" placeholder="https://market.irancell.ir">
                </div>

                <div class="form-group">
                    <label for="language">زبان بنر</label>
                    <select id="language">
                        <option value="فارسی">فارسی</option>
                        <option value="انگلیسی">انگلیسی</option>
                        <option value="فارسی/انگلیسی">دو زبانه (فارسی/انگلیسی)</option>
                    </select>
                </div>

                <span></span> <div class="form-group full-width">
                    <label for="notes">توضیحات و ملزومات اضافه <span>(مانند استفاده از لوگوی خاص در طرح و...)</span></label>
                    <textarea id="notes" placeholder="مثال: از لوگوی اسنپ/ایرانسل در طرح استفاده شود..."></textarea>
                </div>

            </div>

            <button type="submit" id="submitBtn">ارسال بریف به تیم طراحی</button>
        </form>
    </div>

    <script>
        document.getElementById('briefForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.innerText = 'در حال ارسال...';
            submitBtn.disabled = true;

            const formData = {
                business_goal: document.getElementById('business_goal').value,
                main_headline: document.getElementById('main_headline').value,
                sub_headline: document.getElementById('sub_headline').value,
                features: document.getElementById('features').value,
                cta: document.getElementById('cta').value,
                banner_sizes: document.getElementById('banner_sizes').value,
                size_limit: document.getElementById('size_limit').value,
                placement_links: document.getElementById('placement_links').value,
                language: document.getElementById('language').value,
                notes: document.getElementById('notes').value,
                timestamp: new Date().toLocaleString('fa-IR')
            };

            // آدرس وب‌هوک n8n خود را در پایین قرار دهید
            const n8nWebhookUrl = 'https://your-n8n-instance.com/webhook/your-endpoint-id';

            try {
                const response = await fetch(n8nWebhookUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    alert('بریف با موفقیت ثبت شد و برای طراح ارسال گردید.');
                    document.getElementById('briefForm').reset();
                } else {
                    alert('خطایی در ارسال رخ داد. لطفاً دوباره تلاش کنید.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('ارتباط با سرور برقرار نشد.');
            } finally {
                submitBtn.innerText = 'ارسال بریف به تیم طراحی';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
