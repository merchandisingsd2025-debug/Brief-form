<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فرم عریض دریافت بریف طراحی بنر و KV</title>
    <style>
        :root {
            --bg-color: #0A0B0D;
            --card-bg: #121418;
            --accent-color: #B5FF00; /* سبز نئون */
            --text-color: #E2E8F0;
            --muted-text: #94A3B8;
            --border-color: #262930;
            --success-color: #10B981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* ساختار عریض و بزرگ فرم */
        .form-container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 1400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .form-header {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 25px;
            margin-bottom: 35px;
        }

        .form-header h1 {
            font-size: 28px;
            color: #FFF;
            margin-bottom: 10px;
        }

        .form-header p {
            color: var(--muted-text);
            font-size: 15px;
        }

        /* چیدمان ۳ ستونه ماتریکسی */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* فیلدهای تمام عرض */
        .form-group.full-width {
            grid-column: span 3;
        }

        label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        label span {
            color: var(--muted-text);
            font-size: 12px;
            font-weight: normal;
        }

        input, textarea, select {
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 14px;
            color: #FFF;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 12px rgba(181, 255, 0, 0.2);
            background-color: rgba(255, 255, 255, 0.04);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        button {
            background-color: var(--accent-color);
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.3s ease;
            margin-top: 24px;
            width: 100%;
        }

        button:hover {
            background-color: #a2e600;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .result-message {
            margin-top: 20px;
            padding: 14px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            display: none;
        }

        .result-message.success {
            background-color: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success-color);
            color: var(--success-color);
        }

        .result-message.error {
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid #EF4444;
            color: #EF4444;
        }

        /* واکنش‌گرایی برای تبلت و موبایل */
        @media (max-width: 1024px) {
            .form-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .form-group.full-width {
                grid-column: span 2;
            }
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-container {
                padding: 20px;
            }
            .form-group.full-width {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

    <div class="form-container">
        <div class="form-header">
            <h1>فرم ثبت بریف کمپین (ST2000 - Webbanner & KV)</h1>
            <p>لطفاً اطلاعات زیر را جهت هماهنگی و شروع دیزاین بنرها با دقت وارد کنید.</p>
        </div>

        <form id="briefForm">
            <!-- توکن اختصاصی Web3Forms شما -->
            <input type="hidden" name="access_key" value="17c360d8-5830-4edc-8b4c-f3ab261f202b">
            <!-- ارسال خودکار رونوشت (CC) به ایمیل همکار/سازمان شما -->
            <input type="hidden" name="cc" value="bahram.na@mtnirancell.ir">
            <!-- جلوگیری از تغییر صفحه بعد از ثبت فرم -->
            <input type="hidden" name="redirect" value=""> 

            <div class="form-grid">
                
                <!-- هدف تجاری -->
                <div class="form-group full-width">
                    <label for="business_goal">هدف تجاری <span>(محصول چیست؟ چه مشکلی حل می‌کند؟ برای چه کسی است؟ مزیت اصلی و رقابتی چیست؟)</span></label>
                    <textarea id="business_goal" name="هدف تجاری" required placeholder="مثال: معرفی محصول، ویژگی‌ها، پرسونای مخاطب و بازار هدف..."></textarea>
                </div>

                <!-- شعار اصلی -->
                <div class="form-group">
                    <label for="main_headline">شعار یا تیتر اصلی <span>(فارسی/انگلیسی)</span></label>
                    <input type="text" id="main_headline" name="شعار یا تیتر اصلی" required placeholder="مثال: یادت همیشه همراهته">
                </div>

                <!-- شعار فرعی -->
                <div class="form-group">
                    <label for="sub_headline">شعار یا تیتر فرعی <span>(فارسی/انگلیسی)</span></label>
                    <input type="text" id="sub_headline" name="شعار یا تیتر فرعی" placeholder="مثال: انواع هارد اکسترنال و فلش مموری؛ هم اکنون!">
                </div>

                <!-- ویژگی‌های اصلی -->
                <div class="form-group">
                    <label for="features">ویژگی‌های اصلی محصول <span>(ساعت شارژ، تعداد پورت و...)</span></label>
                    <input type="text" id="features" name="ویژگی‌های اصلی محصول" placeholder="مثال: ضد ضربه، سرعت بالا">
                </div>

                <!-- کال تو اکشن -->
                <div class="form-group">
                    <label for="cta">کال تو اکشن (CTA)</label>
                    <input type="text" id="cta" name="کال تو اکشن (CTA)" placeholder="مثال: کلیک کنید / الان بخرید">
                </div>

                <!-- تعداد سایزها و ابعاد -->
                <div class="form-group">
                    <label for="banner_sizes">تعداد و ابعاد سایزهای درخواستی <span>(پیکسل)</span></label>
                    <input type="text" id="banner_sizes" name="تعداد و ابعاد سایزها" required placeholder="مثال: 1080*1920 و 245*600">
                </div>

                <!-- محدودیت حجم -->
                <div class="form-group">
                    <label for="size_limit">محدودیت حجم خروجی</label>
                    <input type="text" id="size_limit" name="محدودیت حجم خروجی" placeholder="مثال: 280kb">
                </div>

                <!-- لینک‌های محل قرارگیری -->
                <div class="form-group">
                    <label for="placement_links">لینک‌های محل قرارگیری بنر</label>
                    <input type="url" id="placement_links" name="لینک‌های محل قرارگیری" placeholder="https://market.irancell.ir">
                </div>

                <!-- زبان -->
                <div class="form-group">
                    <label for="language">زبان بنر</label>
                    <select id="language" name="زبان بنر">
                        <option value="فارسی">فارسی</option>
                        <option value="انگلیسی">انگلیسی</option>
                        <option value="فارسی/انگلیسی">دو زبانه (فارسی/انگلیسی)</option>
                    </select>
                </div>

                <span></span> <!-- المان کمکی جهت تراز ماتریکس گرید -->

                <!-- توضیحات و ملزومات -->
                <div class="form-group full-width">
                    <label for="notes">توضیحات و ملزومات اضافه <span>(مانند استفاده از لوگوی خاص در طرح و...)</span></label>
                    <textarea id="notes" name="توضیحات و ملزومات اضافه" placeholder="مثال: از لوگوی اسنپ/ایرانسل در طرح استفاده شود..."></textarea>
                </div>

            </div>

            <button type="submit" id="submitBtn">ارسال بریف به تیم طراحی</button>
            <div id="resultMessage" class="result-message"></div>
        </form>
    </div>

    <script>
        const form = document.getElementById('briefForm');
        const submitBtn = document.getElementById('submitBtn');
        const resultMessage = document.getElementById('resultMessage');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            submitBtn.innerText = 'در حال ارسال بریف...';
            submitBtn.disabled = true;
            resultMessage.style.display = 'none';

            const formData = new FormData(form);
            const object = Object.fromEntries(formData);
            const json = JSON.stringify(object);

            fetch('https://api.web3forms.com/submit', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: json
            })
            .then(async (response) => {
                let res = await response.json();
                if (response.status == 200) {
                    resultMessage.className = "result-message success";
                    resultMessage.innerText = "بریف با موفقیت ثبت شد و مستقیماً به ایمیل طراحان ارسال گردید.";
                    resultMessage.style.display = 'block';
                    form.reset();
                } else {
                    console.log(response);
                    resultMessage.className = "result-message error";
                    resultMessage.innerText = res.message || "خطایی رخ داد. مجدداً تلاش کنید.";
                    resultMessage.style.display = 'block';
                }
            })
            .catch(error => {
                console.log(error);
                resultMessage.className = "result-message error";
                resultMessage.innerText = "ارتباط با سرور برقرار نشد. وضعیت اینترنت خود را بررسی کنید.";
                resultMessage.style.display = 'block';
            })
            .then(() => {
                submitBtn.innerText = 'ارسال بریف به تیم طراحی';
                submitBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
